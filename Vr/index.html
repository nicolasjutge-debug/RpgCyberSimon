function mkPanel(w,h,fn){ const c=document.createElement('canvas'); c.width=w; c.height=h; const ctx=c.getContext('2d'); if(fn)fn(ctx,w,h); const tex=new THREE.CanvasTexture(c); tex.minFilter=THREE.LinearFilter; return {canvas:c,ctx,tex}; }
function rr(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function wrap(ctx,txt,x,y,mw,lh){ txt.split(' ').reduce((acc,w)=>{ const t=acc+w+' '; if(ctx.measureText(t).width>mw&&acc){ ctx.fillText(acc,x,y); y+=lh; return w+' '; } return t; },''); }
function wrapFill(ctx,txt,x,y,mw,lh){ const words=txt.split(' '); let line=''; words.forEach(w=>{ const t=line+w+' '; if(ctx.measureText(t).width>mw&&line){ ctx.fillText(line,x,y); y+=lh; line=w+' '; } else line=t; }); if(line) ctx.fillText(line,x,y); }

});

  ctx.fillStyle='rgba(13,22,34,.93)'; rr(ctx,0,0,w,h,18); ctx.fill();

  ctx.fillStyle='#b14eff'; ctx.fillRect(0,18,4,h-36);
  ctx.fillStyle='#b14eff'; ctx.font='700 15px monospace'; ctx.textAlign='left'; ctx.fillText('PROFIL',24,38);
  const nm=(profile||'???').toUpperCase();
  const g=ctx.createLinearGradient(24,54,104,134); g.addColorStop(0,'#b14eff'); g.addColorStop(1,'#00f0ff');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(64,94,38,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#060a10'; ctx.font='700 18px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(nm.slice(0,2),64,94);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='#fff'; ctx.font='700 18px monospace'; ctx.fillText(nm,112,86);
  ctx.fillStyle='#b14eff'; ctx.font='400 13px sans-serif'; ctx.fillText('Quest 2 · VR',112,108);
  ctx.fillStyle='#6f8a99'; ctx.font='400 12px monospace';
  ctx.fillText('XP',24,162); ctx.textAlign='right'; ctx.fillText(myXp+' XP',w-24,162); ctx.textAlign='left';
  ctx.fillStyle='rgba(255,255,255,.06)'; rr(ctx,24,170,w-48,7,3); ctx.fill();
  const g2=ctx.createLinearGradient(24,0,w-24,0); g2.addColorStop(0,'#b14eff'); g2.addColorStop(1,'#00f0ff');
  ctx.fillStyle=g2; rr(ctx,24,170,(w-48)*Math.min(1,(myXp%1000)/1000),7,3); ctx.fill();
  const nd=Object.values(myDone).filter(Boolean).length;
  ctx.fillStyle='#ffb020'; ctx.font='700 13px monospace'; ctx.fillText('🔥 '+myStreak+' jours',24,208);
  ctx.fillStyle='#6f8a99'; ctx.font='400 12px monospace'; ctx.fillText(nd+' missions terminées',24,228);
}
const profP=mkPanel(420,268,drawProfile);
leftG.add(new THREE.Mesh(new THREE.PlaneGeometry(.59,.376),new THREE.MeshBasicMaterial({map:profP.tex,transparent:true})));

// ── PANNEAU CLASSEMENT ──────────────────────────────────
const rightG=new THREE.Group(); rightG.position.set(.95,1.5,-.95); rightG.rotation.y=-Math.PI*.16; scene.add(rightG);
let lbRows=[];
function drawLB(ctx,w,h){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='rgba(13,22,34,.93)'; rr(ctx,0,0,w,h,18); ctx.fill();
  ctx.strokeStyle='#1c2c3d'; ctx.lineWidth=2; rr(ctx,1,1,w-2,h-2,18); ctx.stroke();
  ctx.fillStyle='#ffb020'; ctx.fillRect(0,18,4,h-36);
  ctx.fillStyle='#ffb020'; ctx.font='700 15px monospace'; ctx.textAlign='left'; ctx.fillText('CLASSEMENT',24,38);
  if(!lbRows.length){ ctx.fillStyle='#6f8a99'; ctx.font='400 13px monospace'; ctx.fillText('Chargement…',24,76); return; }
  let y=78; lbRows.slice(0,4).forEach((r,i)=>{
    if(r.me){ ctx.fillStyle='rgba(0,240,255,.07)'; rr(ctx,16,y-20,w-32,36,6); ctx.fill(); }
    ctx.fillStyle='#6f8a99'; ctx.font='400 13px monospace'; ctx.fillText(('0'+(i+1)).slice(-2),24,y);
    ctx.fillStyle=r.me?'#00f0ff':'#cfe7ee'; ctx.font=(r.me?'700 ':'400 ')+'15px sans-serif'; ctx.fillText(r.name,56,y);
    ctx.fillStyle='#ffb020'; ctx.font='400 12px monospace'; ctx.textAlign='right'; ctx.fillText(r.xp+' XP',w-24,y); ctx.textAlign='left';
    y+=50;
  });
}
const lbP=mkPanel(420,268,drawLB);
rightG.add(new THREE.Mesh(new THREE.PlaneGeometry(.59,.376),new THREE.MeshBasicMaterial({map:lbP.tex,transparent:true})));

// ── PANNEAU CENTRE ──────────────────────────────────────
const cG=new THREE.Group(); cG.position.set(0,1.55,-1.3); scene.add(cG);
const cP=mkPanel(680,460,null);
cG.add(new THREE.Mesh(new THREE.PlaneGeometry(1.06,.72),new THREE.MeshBasicMaterial({map:cP.tex,transparent:true})));
const btns=[]; const BTN_COLORS=[]; 
for(let i=0;i<6;i++){
  const p=mkPanel(640,70,null);
  const m=new THREE.Mesh(new THREE.PlaneGeometry(1.0,.11),new THREE.MeshBasicMaterial({map:p.tex,transparent:true}));
  m.position.set(0,.3-i*.12,.01); m.visible=false; m.userData={p,cb:null};
  cG.add(m); btns.push(m);
}
// XP float
const xpP=mkPanel(280,80,null);
const xpM=new THREE.Mesh(new THREE.PlaneGeometry(.36,.1),new THREE.MeshBasicMaterial({map:xpP.tex,transparent:true,opacity:0}));
xpM.position.set(.46,.28,.02); cG.add(xpM); let xpA=null;

function cBg(ctx,w,h,title,sub,body,col){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='rgba(13,22,34,.94)'; rr(ctx,0,0,w,h,20); ctx.fill();
  ctx.strokeStyle='#1c2c3d'; ctx.lineWidth=2; rr(ctx,1,1,w-2,h-2,20); ctx.stroke();
  ctx.fillStyle=col||'#00f0ff'; ctx.fillRect(0,26,4,h-52);
  ctx.fillStyle=col||'#00f0ff'; ctx.shadowColor=col||'#00f0ff'; ctx.shadowBlur=6;
  ctx.font='700 17px monospace'; ctx.textAlign='left'; ctx.fillText(title,26,46); ctx.shadowBlur=0;
  if(sub){ ctx.fillStyle='#6f8a99'; ctx.font='400 12px monospace'; ctx.fillText(sub,26,66); }
  if(body){ ctx.fillStyle='#e8f4f8'; ctx.font='400 19px sans-serif'; wrapFill(ctx,body,26,100,628,27); }
}
function dBtn(m,label,col,hlBg){
  const ctx=m.userData.p.ctx; ctx.clearRect(0,0,640,70);
  ctx.fillStyle=hlBg||'rgba(255,255,255,.025)'; rr(ctx,0,0,640,70,9); ctx.fill();
  ctx.strokeStyle=col||'#1c2c3d'; ctx.lineWidth=3; rr(ctx,2,2,636,66,9); ctx.stroke();
  ctx.fillStyle='#cfe7ee'; ctx.font='600 22px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(label,22,35); m.userData.p.tex.needsUpdate=true;
}
function hideB(){ btns.forEach(m=>m.visible=false); }
function showB(items){ hideB(); items.forEach((it,i)=>{ if(i>=6)return; const m=btns[i]; m.visible=true; m.position.y=.3-i*.12; dBtn(m,it.label,it.col,it.bg); m.userData.cb=it.cb; }); }

// ── NAVIGATION ZONES ────────────────────────────────────
function renderZones(){
  cBg(cP.ctx,680,460,'CHOISIR UNE ZONE',null,'Sélectionne ta zone de formation :','#00f0ff'); cP.tex.needsUpdate=true;
  showB(ZONES.map(z=>({
    label: z.icon+' '+z.name+' ('+z.weeks.filter(w=>myDone[z.id+'_'+w.n]).length+'/'+z.weeks.length+')',
    col: z.color,
    bg: z.weeks.every(w=>myDone[z.id+'_'+w.n])?'rgba(39,224,160,.06)':null,
    cb: ()=>renderWeeks(z)
  })));
}

// ── NAVIGATION SEMAINES ─────────────────────────────────
function renderWeeks(z,page){
  const p=page||0; const start=p*5; const slice=z.weeks.slice(start,start+5);
  cBg(cP.ctx,680,460,z.icon+' '+z.name,z.desc,null,z.color); cP.tex.needsUpdate=true;
  const items=[{label:'← Retour zones',col:'#6f8a99',cb:renderZones}];
  slice.forEach(w=>{ const done=!!myDone[z.id+'_'+w.n]; items.push({label:(done?'✅ ':'▶ ')+'S'+w.n+' · '+w.title,col:done?'#27e0a0':z.color,bg:done?'rgba(39,224,160,.05)':null,cb:()=>loadQ(z,w)}); });
  if(z.weeks.length>5&&p===0) items.push({label:'→ S6-S'+z.weeks.length,col:'#ffb020',cb:()=>renderWeeks(z,1)});
  if(p>0) items[items.length>5?items.length-1:0]={label:'← S1-S5',col:'#6f8a99',cb:()=>renderWeeks(z,0)};
  showB(items);
}

// ── QCM GROQ ────────────────────────────────────────────
async function loadQ(z,w){
  selZone=z; selWeek=w; qLocked=true; hideB();
  cBg(cP.ctx,680,460,'⏳ Génération…',z.name+' · S'+w.n+' '+w.title,null,z.color); cP.tex.needsUpdate=true;
  try{
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+groqKey},
      body:JSON.stringify({
        model:MODEL, max_tokens:500, temperature:0.8,
        messages:[
          {role:'system',content:'Tu génères des QCM cybersécurité en français pour lycéen STI2D. Réponds UNIQUEMENT en JSON compact: {"q":"...","opts":["...","...","...","..."],"ok":0,"exp":"..."}'},
          {role:'user',content:'Zone: '+z.name+'\nS'+w.n+': '+w.title+' — '+w.sub+'\nSujets: '+w.topics.join(', ')+'\nUne question précise sur ces sujets.'}
        ]
      })
    });
    if(!res.ok){ const err=await res.json().catch(()=>({})); throw new Error('HTTP '+res.status+' — '+(err.error?.message||'clé refusée?')); }
    const raw=(await res.json()).choices?.[0]?.message?.content||'';
    const d=JSON.parse(raw.replace(/```json|```/g,'').trim());
    const done=!!myDone[z.id+'_'+w.n];
    cBg(cP.ctx,680,460,'QCM · '+w.title.toUpperCase(),z.name+' S'+w.n+(done?' ✅ Déjà faite':''),d.q,z.color); cP.tex.needsUpdate=true;
    const L=['A','B','C','D'];
    showB([{label:'← Semaines',col:'#6f8a99',cb:()=>renderWeeks(z)},...d.opts.slice(0,4).map((o,i)=>({label:L[i]+' · '+o,col:z.color,cb:()=>onAns(i,d.ok,d.exp,z,w)}))]);
    qLocked=false;
  }catch(e){
    cBg(cP.ctx,680,460,'ERREUR','',''+e.message,'#ff3b5c'); cP.tex.needsUpdate=true;
    showB([{label:'← Retour semaines',col:'#6f8a99',cb:()=>renderWeeks(z)}]); qLocked=false;
  }
}

// ── VALIDATION ──────────────────────────────────────────
async function onAns(idx,ok,exp,z,w){
  if(qLocked)return; qLocked=true;
  const correct=idx===ok;
  cBg(cP.ctx,680,460,correct?'✅ CORRECT !':'❌ RATÉ',z.name+' S'+w.n,exp+(correct&&!myDone[z.id+'_'+w.n]?'\n\n+100 XP !':''),correct?'#27e0a0':'#ff3b5c'); cP.tex.needsUpdate=true;
  if(correct&&!myDone[z.id+'_'+w.n]){
    const c=xpP.ctx; c.clearRect(0,0,280,80); c.fillStyle='#27e0a0'; c.font='700 36px monospace'; c.textAlign='center'; c.fillText('+100 XP',140,50); xpP.tex.needsUpdate=true;
    xpM.material.opacity=1; xpA={t:0};
    await syncProg(z.id+'_'+w.n);
  }
  setTimeout(()=>{ correct?renderWeeks(z):loadQ(z,w); },2500);
}

// ── JSONBIN READ ─────────────────────────────────────────
async function loadPlayerData(){
  if(!jbKey)return;
  try{
    const res=await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID+'/latest',{headers:{'X-Master-Key':jbKey}});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const record=(await res.json()).record||{};
    const e=Object.values(record).find(v=>v&&(v.name||'').toLowerCase()===profile);
    if(e){ myDone=e.done||{}; myStreak=e.streak||0; myXp=calcXP(myDone); }
  }catch(e){ statusEl.textContent='Lecture JSONBin: '+e.message; }
}

// ── JSONBIN WRITE ────────────────────────────────────────
async function syncProg(key){
  if(!jbKey)return;
  try{
    const r1=await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID+'/latest',{headers:{'X-Master-Key':jbKey}});
    const record=(await r1.json()).record||{};
    let tk=Object.keys(record).find(k=>k!=='init'&&record[k]&&(record[k].name||'').toLowerCase()===profile);
    if(!tk){ tk='p_'+Date.now(); record[tk]={name:profile.charAt(0).toUpperCase()+profile.slice(1),avatar:'🥽',xp:0,done:{},streak:myStreak,updatedAt:Date.now()}; }
    if(!record[tk].done) record[tk].done={};
    record[tk].done[key]=true; myDone[key]=true; myXp=calcXP(myDone);
    record[tk].xp=myXp; record[tk].updatedAt=Date.now();
    await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':jbKey},body:JSON.stringify(record)});
    loadLB();
  }catch(e){ statusEl.style.color='#ff6b81'; statusEl.textContent='Sync: '+e.message; }
}

// ── JSONBIN CLASSEMENT ───────────────────────────────────
async function loadLB(){
  if(!jbKey)return;
  try{
    const res=await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID+'/latest',{headers:{'X-Master-Key':jbKey}});
    const rec=(await res.json()).record||{};
    lbRows=Object.entries(rec).filter(([k,v])=>k!=='init'&&v&&v.name).map(([,v])=>({name:v.name,xp:calcXP(v.done||{}),me:(v.name||'').toLowerCase()===profile}));
    lbRows.sort((a,b)=>b.xp-a.xp);
    drawLB(lbP.ctx,420,268); lbP.tex.needsUpdate=true;
  }catch(e){ /* silencieux */ }
}
setInterval(loadLB,20000);

// ── DESKTOP CONTROLS ─────────────────────────────────────
let yaw=0,pit=0,drag=false,lx=0,ly=0;
renderer.domElement.addEventListener('pointerdown',e=>{ if(renderer.xr.isPresenting)return; drag=true;lx=e.clientX;ly=e.clientY; });
window.addEventListener('pointerup',()=>drag=false);
window.addEventListener('pointermove',e=>{ if(!drag||renderer.xr.isPresenting)return; yaw-=(e.clientX-lx)*.004; pit-=(e.clientY-ly)*.003; pit=Math.max(-1,Math.min(1,pit)); lx=e.clientX;ly=e.clientY; cam.rotation.set(pit,yaw,0,'YXZ'); });

// ── RAYCAST ──────────────────────────────────────────────
const RC=new THREE.Raycaster(); const MV=new THREE.Vector2(); const TM=new THREE.Matrix4();
function doRay(origin,dir){ RC.ray.origin.copy(origin); RC.ray.direction.copy(dir); const h=RC.intersectObjects(btns.filter(m=>m.visible)); if(h.length&&h[0].object.userData.cb) h[0].object.userData.cb(); }
renderer.domElement.addEventListener('click',e=>{ if(renderer.xr.isPresenting)return; MV.x=(e.clientX/innerWidth)*2-1;MV.y=-(e.clientY/innerHeight)*2+1; RC.setFromCamera(MV,cam); const h=RC.intersectObjects(btns.filter(m=>m.visible)); if(h.length&&h[0].object.userData.cb) h[0].object.userData.cb(); });
[0,1].forEach(i=>{ const c=renderer.xr.getController(i); const ln=new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,0,-1)]),new THREE.LineBasicMaterial({color:0x00f0ff,opacity:.6,transparent:true})); ln.scale.z=5; c.add(ln); c.addEventListener('selectstart',()=>{ TM.identity().extractRotation(c.matrixWorld); const o=new THREE.Vector3().setFromMatrixPosition(c.matrixWorld); const d=new THREE.Vector3(0,0,-1).applyMatrix4(TM); doRay(o,d); }); scene.add(c); });

// ── VR BUTTON ────────────────────────────────────────────
const vrBtn=document.getElementById('vrBtn');
if(!navigator.xr) vrBtn.disabled=true;
else navigator.xr.isSessionSupported('immersive-vr').then(s=>{ if(!s) vrBtn.disabled=true; });
let xrS=null;
vrBtn.addEventListener('click',async()=>{
  if(xrS){xrS.end();return;}
  try{ const s=await navigator.xr.requestSession('immersive-vr',{optionalFeatures:['local-floor','bounded-floor']}); xrS=s; renderer.xr.setSession(s); vrBtn.textContent='⏹ Stop VR'; s.addEventListener('end',()=>{xrS=null;vrBtn.textContent='🥽 VR';}); }
  catch(e){ statusEl.textContent='VR: '+e.message; }
});

// ── BOUCLE ───────────────────────────────────────────────
let tt=0;
renderer.setAnimationLoop(()=>{
  tt+=.01;
  const pa=pGeo.attributes.position.array;
  for(let i=0;i<80;i++) pa[i*3+1]+=Math.sin(tt+i)*.0004;
  pGeo.attributes.position.needsUpdate=true;
  if(xpA){ xpA.t+=.02; xpM.position.y=.28+xpA.t*.13; xpM.material.opacity=Math.max(0,1-xpA.t); if(xpA.t>1){xpA=null;xpM.position.y=.28;} }
  drawProfile(profP.ctx,420,268); profP.tex.needsUpdate=true;
  renderer.render(scene,cam);
});

// ── INIT ─────────────────────────────────────────────────
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
if(profile&&groqKey&&jbKey) loadPlayerData().then(()=>{ renderZones(); loadLB(); });
