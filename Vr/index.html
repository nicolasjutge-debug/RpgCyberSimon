function lsg(k){try{return localStorage.getItem(k)||'';}catch(e){return '';}}
function lss(k,v){try{localStorage.setItem(k,v);}catch(e){}}
if(lsg('cq_ver')!==VER){['cq_p','cq_g','cq_j'].forEach(k=>lss(k,''));lss('cq_ver',VER);}

let profile=lsg('cq_p'),groqKey=lsg('cq_g'),jbKey=lsg('cq_j');
let myXp=0,myDone={},myStreak=0,myBQ={};
let selZone=null,qLocked=false,coursText='',coursPage=0;
const st=document.getElementById('st');

function totalDone(){return Object.values(myDone).filter(Boolean).length;}
function calcXP(done,bq){
  let x=0;ZONES.forEach(z=>z.weeks.forEach(w=>{if(done[z.id+'_'+w.n])x+=100;}));
  BQ.forEach(q=>{if(bq&&bq[q.id])x+=q.xp;});SCENARIOS.forEach(s=>{if(bq&&bq[s.id])x+=s.xp;});return x;
}
function updateStreak(){
  const td=new Date().toISOString().slice(0,10),last=lsg('cq_last');
  if(last===td)return;
  const yd=new Date(Date.now()-86400000).toISOString().slice(0,10);
  myStreak=last===yd?(myStreak+1):1;lss('cq_last',td);
}

const ov=document.getElementById('ov'),gkI=document.getElementById('gkI'),jbI=document.getElementById('jbI'),oerr=document.getElementById('oerr');
let selP=profile||'simon';
function showOv(){ov.style.display='flex';gkI.value=groqKey;jbI.value=jbKey;syncPB();}
function hideOv(){ov.style.display='none';}
function syncPB(){document.querySelectorAll('.pb').forEach(b=>b.classList.toggle('sel',b.dataset.n===selP));}
function applyConfig(p,g,j){
  if(!g.startsWith('gsk_')){oerr.textContent='Clé Groq invalide';return false;}
  if(!j.startsWith('$2a$')){oerr.textContent='Clé JSONBin invalide';return false;}
  profile=p;groqKey=g;jbKey=j;selP=p;
  lss('cq_p',p);lss('cq_g',g);lss('cq_j',j);
  oerr.textContent='';hideOv();
  loadPlayer().then(()=>{renderZones();loadLB();});return true;
}
// Méthode rapide — coller JSON
document.getElementById('pasteBtn').addEventListener('click',()=>{
  try{
    const d=JSON.parse(document.getElementById('pasteArea').value.trim());
    if(!d.p||!d.g||!d.j){oerr.textContent='JSON incomplet (p, g, j requis)';return;}
    applyConfig(d.p,d.g,d.j);

    const r=await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID+'/latest',{headers:{'X-Master-Key':jbKey}});
    const rec=(await r.json()).record||{};
    let tk=Object.keys(rec).find(k=>k!=='init'&&rec[k]&&(rec[k].name||'').toLowerCase()===profile);
    if(!tk){tk='p_'+Date.now();rec[tk]={name:profile.charAt(0).toUpperCase()+profile.slice(1),avatar:'🥽',xp:0,done:{},streak:myStreak,bonusClaimed:{},updatedAt:Date.now()};}
    if(!rec[tk].done)rec[tk].done={};if(!rec[tk].bonusClaimed)rec[tk].bonusClaimed={};
    if(dk){rec[tk].done[dk]=true;myDone[dk]=true;}
    if(bqAdd)Object.assign(rec[tk].bonusClaimed,bqAdd);
    rec[tk].streak=myStreak;rec[tk].updatedAt=Date.now();myXp=calcXP(myDone,rec[tk].bonusClaimed);rec[tk].xp=myXp;
    await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':jbKey},body:JSON.stringify(rec)});
    loadLB();
  }catch(e){st.style.color='#ff6b81';st.textContent='Sync: '+e.message;}
}
async function loadLB(){
  if(!jbKey)return;
  try{const res=await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID+'/latest',{headers:{'X-Master-Key':jbKey}});const rec=(await res.json()).record||{};lbR=Object.entries(rec).filter(([k,v])=>k!=='init'&&v&&v.name).map(([,v])=>{return{name:v.name,xp:calcXP(v.done||{},v.bonusClaimed||{}),me:(v.name||'').toLowerCase()===profile}});lbR.sort((a,b)=>b.xp-a.xp);drawLB(lbP.ctx,420,268);lbP.tex.needsUpdate=true;}catch(e){}
}
setInterval(loadLB,20000);

// ── CONTRÔLES ─────────────────────────────────────────
let yaw=0,pit=0,drag=false,lx=0,ly=0;
rdr.domElement.addEventListener('pointerdown',e=>{if(rdr.xr.isPresenting)return;drag=true;lx=e.clientX;ly=e.clientY;});
window.addEventListener('pointerup',()=>drag=false);
window.addEventListener('pointermove',e=>{if(!drag||rdr.xr.isPresenting)return;yaw-=(e.clientX-lx)*.004;pit-=(e.clientY-ly)*.003;pit=Math.max(-1,Math.min(1,pit));lx=e.clientX;ly=e.clientY;cam.rotation.set(pit,yaw,0,'YXZ');});
const RC=new THREE.Raycaster(),MV=new THREE.Vector2(),TM=new THREE.Matrix4();
rdr.domElement.addEventListener('click',e=>{if(rdr.xr.isPresenting)return;MV.x=(e.clientX/innerWidth)*2-1;MV.y=-(e.clientY/innerHeight)*2+1;RC.setFromCamera(MV,cam);const h=RC.intersectObjects(bMs.filter(m=>m.visible));if(h.length&&h[0].object.userData.cb)h[0].object.userData.cb();});
[0,1].forEach(i=>{const c=rdr.xr.getController(i);const ln=new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,0,-1)]),new THREE.LineBasicMaterial({color:0x00f0ff,opacity:.6,transparent:true}));ln.scale.z=5;c.add(ln);c.addEventListener('selectstart',()=>{TM.identity().extractRotation(c.matrixWorld);RC.ray.origin.setFromMatrixPosition(c.matrixWorld);RC.ray.direction.set(0,0,-1).applyMatrix4(TM);const h=RC.intersectObjects(bMs.filter(m=>m.visible));if(h.length&&h[0].object.userData.cb)h[0].object.userData.cb();});scene.add(c);});

// ── VR ────────────────────────────────────────────────
const vrBtn=document.getElementById('vrBtn');
if(!navigator.xr)vrBtn.disabled=true;else navigator.xr.isSessionSupported('immersive-vr').then(s=>{if(!s)vrBtn.disabled=true;});
let xrS=null;
vrBtn.addEventListener('click',async()=>{if(xrS){xrS.end();return;}try{const s=await navigator.xr.requestSession('immersive-vr',{optionalFeatures:['local-floor','bounded-floor']});xrS=s;rdr.xr.setSession(s);vrBtn.textContent='⏹ Stop';s.addEventListener('end',()=>{xrS=null;vrBtn.textContent='🥽 VR';});}catch(e){st.textContent='VR: '+e.message;}});

// ── BOUCLE ────────────────────────────────────────────
let tt=0;
rdr.setAnimationLoop(()=>{tt+=.01;const pa=pG.attributes.position.array;for(let i=0;i<80;i++)pa[i*3+1]+=Math.sin(tt+i)*.0004;pG.attributes.position.needsUpdate=true;if(xpA){xpA.t+=.02;xpFM.position.y=.28+xpA.t*.13;xpFM.material.opacity=Math.max(0,1-xpA.t);if(xpA.t>1){xpA=null;xpFM.position.y=.28;}}drawProf(profP.ctx,420,268);profP.tex.needsUpdate=true;rdr.render(scene,cam);});

// ── INIT ──────────────────────────────────────────────
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
if(profile&&groqKey&&jbKey)loadPlayer().then(()=>{renderZones();loadLB();});

</script>
