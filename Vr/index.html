function makePanel(w,h,draw){
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const ctx=c.getContext('2d'); if(draw) draw(ctx,w,h);
  const tex=new THREE.CanvasTexture(c); tex.minFilter=THREE.LinearFilter;
  return {canvas:c,ctx,tex};
}
function rr(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function wrap(ctx,text,x,y,mw,lh){ const ws=text.split(' '); let line='',yy=y; for(const w of ws){ const t=line+w+' '; if(ctx.measureText(t).width>mw&&line!==''){ ctx.fillText(line,x,yy); line=w+' '; yy+=lh; }else line=t; } ctx.fillText(line,x,yy); }

const leftG=new THREE.Group(); leftG.position.set(-.95,1.5,-.95); leftG.rotation.y=Math.PI*.16; scene.add(leftG);
function drawProfile(ctx,w,h){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='rgba(13,22,34,0.92)'; rr(ctx,0,0,w,h,20); ctx.fill();
  ctx.strokeStyle='#1c2c3d'; ctx.lineWidth=2; rr(ctx,1,1,w-2,h-2,20); ctx.stroke();
  ctx.fillStyle='#b14eff'; ctx.fillRect(0,20,4,h-40);
  ctx.fillStyle='#b14eff'; ctx.font='700 16px "Space Mono"'; ctx.textAlign='left'; ctx.fillText('PROFIL',26,40);
  const name=(activeProfile||'???').toUpperCase();
  const grad=ctx.createLinearGradient(26,56,110,144);
  grad.addColorStop(0,'#b14eff'); grad.addColorStop(1,'#00f0ff');
  ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(68,98,40,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#060a10'; ctx.font='700 20px "Space Mono"'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(name.slice(0,2),68,98);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='#fff'; ctx.font='700 20px "Space Mono"'; ctx.fillText(name,118,90);
  ctx.fillStyle='#b14eff'; ctx.font='400 14px Inter'; ctx.fillText('Quest 2 · VR',118,114);
  ctx.fillStyle='#6f8a99'; ctx.font='400 13px "Space Mono"';
  ctx.fillText('XP',26,168); ctx.textAlign='right'; ctx.fillText(myXp+' XP',w-26,168); ctx.textAlign='left';
  ctx.fillStyle='rgba(255,255,255,.06)'; rr(ctx,26,176,w-52,8,4); ctx.fill();
  const prog=Math.min(1,(myXp%1000)/1000);
  const g2=ctx.createLinearGradient(26,0,w-26,0); g2.addColorStop(0,'#b14eff'); g2.addColorStop(1,'#00f0ff');
  ctx.fillStyle=g2; rr(ctx,26,176,(w-52)*prog,8,4); ctx.fill();
  const done=Object.values(myDone).filter(Boolean).length;
  ctx.fillStyle='#ffb020'; ctx.font='700 15px "Space Mono"'; ctx.textAlign='left';
  ctx.fillText('🔥 Streak: '+myStreak,26,218);
  ctx.fillStyle='#6f8a99'; ctx.font='400 13px "Space Mono"';
  ctx.fillText(done+' missions complètes',26,240);
}
const profileP=makePanel(440,280,drawProfile);
leftG.add(new THREE.Mesh(new THREE.PlaneGeometry(.62,.394),new THREE.MeshBasicMaterial({map:profileP.tex,transparent:true})));

const rightG=new THREE.Group(); rightG.position.set(.95,1.5,-.95); rightG.rotation.y=-Math.PI*.16; scene.add(rightG);
let lbRows=[];
function drawLeaderboard(ctx,w,h){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='rgba(13,22,34,0.92)'; rr(ctx,0,0,w,h,20); ctx.fill();
  ctx.strokeStyle='#1c2c3d'; ctx.lineWidth=2; rr(ctx,1,1,w-2,h-2,20); ctx.stroke();
  ctx.fillStyle='#ffb020'; ctx.fillRect(0,20,4,h-40);
  ctx.fillStyle='#ffb020'; ctx.font='700 16px "Space Mono"'; ctx.textAlign='left'; ctx.fillText('CLASSEMENT',26,40);

    if(r.isMe){ ctx.fillStyle='rgba(0,240,255,.08)'; rr(ctx,18,y-22,w-36,38,7); ctx.fill(); }

const centerG=new THREE.Group(); centerG.position.set(0,1.55,-1.3); scene.add(centerG);
const centerP=makePanel(680,460,null);
const centerM=new THREE.Mesh(new THREE.PlaneGeometry(1.08,.73),new THREE.MeshBasicMaterial({map:centerP.tex,transparent:true}));

// Options interactives (4 boutons dynamiques)
const btnMeshes=[];
for(let i=0;i<6;i++){
  const p=makePanel(620,70,null);

  m.position.set(0,.06-i*.13,.01);

// XP float
const xpFloatP=makePanel(260,80,null);
const xpFloatM=new THREE.Mesh(new THREE.PlaneGeometry(.32,.1),new THREE.MeshBasicMaterial({map:xpFloatP.tex,transparent:true,opacity:0}));
xpFloatM.position.set(.46,.28,.02); centerG.add(xpFloatM);
let xpAnim=null;

function drawCenterBg(ctx,w,h,title,sub,body,color){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='rgba(13,22,34,0.93)'; rr(ctx,0,0,w,h,22); ctx.fill();
  ctx.strokeStyle='#1c2c3d'; ctx.lineWidth=2; rr(ctx,1,1,w-2,h-2,22); ctx.stroke();
  ctx.fillStyle=color||'#00f0ff'; ctx.fillRect(0,28,4,h-56);
  ctx.fillStyle=color||'#00f0ff'; ctx.font='700 18px "Space Mono"'; ctx.textAlign='left'; ctx.shadowColor=color||'#00f0ff'; ctx.shadowBlur=8;
  ctx.fillText(title,28,48); ctx.shadowBlur=0;
  if(sub){ ctx.fillStyle='#6f8a99'; ctx.font='400 13px "Space Mono"'; ctx.fillText(sub,28,68); }
  if(body){ ctx.fillStyle='#e8f6fa'; ctx.font='400 20px Inter'; wrap(ctx,body,28,105,620,28); }
}
function drawBtn(p,label,color,bg,active){
  const ctx=p.ctx; ctx.clearRect(0,0,620,70);
  ctx.fillStyle=bg||'rgba(255,255,255,.03)'; rr(ctx,0,0,620,70,10); ctx.fill();
  ctx.strokeStyle=color||'#1c2c3d'; ctx.lineWidth=3; rr(ctx,2,2,616,66,10); ctx.stroke();
  ctx.fillStyle=color&&active?color:'#cfe7ee'; ctx.font='600 24px Inter'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(label,24,35);
  p.tex.needsUpdate=true;
}
function hideAllBtns(){ btnMeshes.forEach(m=>m.visible=false); }
function showBtns(items){ // items: [{label, color, cb, done}]
  btnMeshes.forEach((m,i)=>{
    if(i<items.length){
      const it=items[i];
      m.visible=true;
      m.position.y=.06-i*.13;
      drawBtn(m.userData.panel, it.label, it.color||'#1c2c3d', it.done?'rgba(39,224,160,.08)':null, false);
      m.userData.cb=it.cb;
      m.userData.color=it.color||'#1c2c3d';
      m.userData.label=it.label;
    } else { m.visible=false; }
  });
}

// ═══════════════════════════════════════════════════════
// NAVIGATION : SÉLECTION ZONE
// ═══════════════════════════════════════════════════════
function renderZoneSelect(){
  selectedZone=null; selectedWeek=null; questionLocked=false;
  drawCenterBg(centerP.ctx,680,460,'CHOISIR UNE ZONE',null,'Sélectionne ta zone de formation :','#00f0ff');
  centerP.tex.needsUpdate=true;
  // Repositionner les boutons (6 zones = 2 lignes de 3 ? non, colonne)
  // On ajuste l'espacement pour 6 zones
  btnMeshes.forEach((m,i)=>{
    if(i<6){
      m.visible=true;
      m.position.y=.28-i*.115;
      const z=ZONES[i];
      const done=z.weeks.every(w=>myDone[z.id+'_'+w.n]);
      const progress=z.weeks.filter(w=>myDone[z.id+'_'+w.n]).length;
      drawBtn(m.userData.panel, z.icon+' '+z.name+' ('+progress+'/'+z.weeks.length+')', z.color, done?'rgba(39,224,160,.06)':null);
      m.userData.cb=()=>renderWeekSelect(z);
      m.userData.color=z.color;
    }
  });
}

// ═══════════════════════════════════════════════════════
// NAVIGATION : SÉLECTION SEMAINE
// ═══════════════════════════════════════════════════════
function renderWeekSelect(zone){
  selectedZone=zone;
  drawCenterBg(centerP.ctx,680,460,zone.icon+' '+zone.name,zone.desc,null,zone.color);
  // Bouton retour
  centerP.ctx.fillStyle='#6f8a99'; centerP.ctx.font='400 13px "Space Mono"';
  centerP.ctx.fillText('← Retour zones',28,82);
  centerP.tex.needsUpdate=true;

  const items=[{label:'← Retour zones',color:'#6f8a99',cb:()=>renderZoneSelect()}];
  zone.weeks.slice(0,5).forEach(w=>{
    const key=zone.id+'_'+w.n;
    const done=!!myDone[key];
    items.push({
      label:(done?'✅ ':'▶ ')+'S'+w.n+' '+w.title,
      color:done?'#27e0a0':zone.color,
      done,
      cb:()=>loadQuestion(zone,w)
    });
  });
  // Si + de 5 semaines, ajouter un "Suite →"
  if(zone.weeks.length>5){
    items.push({label:'Suite → (S6-S'+zone.weeks.length+')',color:'#ffb020',cb:()=>renderWeekSelectPage2(zone)});
  }
  showBtns(items);
  btnMeshes.forEach((m,i)=>{ if(m.visible) m.position.y=.32-i*.13; });
}
function renderWeekSelectPage2(zone){
  const items=[{label:'← Retour S1-S5',color:'#6f8a99',cb:()=>renderWeekSelect(zone)}];
  zone.weeks.slice(5).forEach(w=>{
    const key=zone.id+'_'+w.n;
    const done=!!myDone[key];
    items.push({label:(done?'✅ ':'▶ ')+'S'+w.n+' '+w.title,color:done?'#27e0a0':zone.color,done,cb:()=>loadQuestion(zone,w)});
  });
  showBtns(items);
  btnMeshes.forEach((m,i)=>{ if(m.visible) m.position.y=.32-i*.13; });
}

// ═══════════════════════════════════════════════════════
// GÉNÉRATION QCM VIA GROQ (contexte zone + semaine)
// ═══════════════════════════════════════════════════════
async function loadQuestion(zone,week){
  selectedWeek=week; questionLocked=true; hideAllBtns();
  drawCenterBg(centerP.ctx,680,460,'⏳ Génération…',zone.name+' · S'+week.n+' '+week.title,null,zone.color);
  centerP.tex.needsUpdate=true;

  if(!groqKey){ drawCenterBg(centerP.ctx,680,460,'ERREUR','Pas de clé Groq','Configure via 👤 Profil','#ff3b5c'); centerP.tex.needsUpdate=true; questionLocked=false; return; }

  const topicsStr=week.topics.join(', ');
  try{
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+groqKey},
      body:JSON.stringify({
        model:GROQ_MODEL,
        messages:[
          {role:'system',content:'Tu génères des QCM de cybersécurité en français pour un lycéen STI2D préparant une alternance. Réponds UNIQUEMENT en JSON valide sans markdown:\n{"question":"...","options":["...","...","...","..."],"correctIndex":0,"explanation":"..."}\n\nLa question doit porter sur le sujet exact fourni.'},
          {role:'user',content:'Zone: '+zone.name+'\nSemaine '+week.n+': '+week.title+'\nSous-titre: '+week.sub+'\nSujets: '+topicsStr+'\n\nGénère une question de QCM sur ces sujets précis.'}
        ],
        temperature:0.8
      })
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    let raw=(data.choices?.[0]?.message?.content||'').replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(raw);
    const done=!!myDone[zone.id+'_'+week.n];

    // Afficher question + explication si déjà fait
    const subTitle=zone.name+' · S'+week.n+(done?' ✅ Déjà complétée':'');
    drawCenterBg(centerP.ctx,680,460,'QCM — '+week.title.toUpperCase(),subTitle,parsed.question,zone.color);
    centerP.tex.needsUpdate=true;

    const letters=['A','B','C','D'];
    const items=[{label:'← Changer de semaine',color:'#6f8a99',cb:()=>renderWeekSelect(zone)}];
    parsed.options.slice(0,4).forEach((opt,i)=>{
      items.push({label:letters[i]+' · '+opt,color:zone.color,cb:()=>selectOption(i,parsed.correctIndex,parsed.explanation,zone,week)});
    });
    showBtns(items);
    btnMeshes.forEach((m,i)=>{ if(m.visible) m.position.y=.28-i*.13; });
    questionLocked=false;

  }catch(err){
    drawCenterBg(centerP.ctx,680,460,'ERREUR GROQ','',''+err.message+'\n\nVérifie ta clé via 👤 Profil','#ff3b5c');
    centerP.tex.needsUpdate=true;
    hideAllBtns(); questionLocked=false;
    showBtns([{label:'← Retour zones',color:'#6f8a99',cb:()=>renderZoneSelect()}]);
    btnMeshes[0].position.y=.28;
  }
}

// ═══════════════════════════════════════════════════════
// VALIDATION RÉPONSE (100 XP comme iPhone)
// ═══════════════════════════════════════════════════════
async function selectOption(idx,correctIdx,explanation,zone,week){
  if(questionLocked) return;
  questionLocked=true;
  const correct=idx===correctIdx;
  const letters=['A','B','C','D'];

  // Feedback visuel
  drawCenterBg(centerP.ctx,680,460,correct?'✅ CORRECT !':'❌ RATÉ !',zone.name+' · S'+week.n+' '+week.title, (explanation||'')+(correct?'\n\n+100 XP !':''),correct?'#27e0a0':'#ff3b5c');
  centerP.tex.needsUpdate=true;

  if(correct&&!myDone[zone.id+'_'+week.n]){
    // Animation XP
    const c=xpFloatP.ctx; c.clearRect(0,0,260,80);
    c.fillStyle='#27e0a0'; c.font='700 36px "Space Mono"'; c.textAlign='center';
    c.fillText('+100 XP',130,48); xpFloatP.tex.needsUpdate=true;
    xpFloatM.material.opacity=1; xpAnim={t:0};
    // Sync JSONBin
    await syncProgress(zone.id+'_'+week.n);
  }

  setTimeout(()=>{
    if(correct||myDone[zone.id+'_'+week.n]){
      renderWeekSelect(zone);
    } else {
      // Mauvaise réponse : relancer une question sur la même semaine
      loadQuestion(zone,week);
    }
  },3000);
}

// ═══════════════════════════════════════════════════════
// JSONBIN — LECTURE
// ═══════════════════════════════════════════════════════
async function loadPlayerData(){
  if(!JSONBIN_KEY||JSONBIN_KEY==='<TA_CLE_ICI>') return;
  try{
    const res=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_BIN_ID+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY}});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    const record=data.record||{};
    const entry=Object.values(record).find(v=>v&&(v.name||'').toLowerCase()===activeProfile);
    if(entry){
      myDone=entry.done||{};
      myStreak=entry.streak||0;
      myXp=calcXP(myDone);
    }
  }catch(e){ statusEl.textContent='Erreur lecture: '+e.message; }
}

// ═══════════════════════════════════════════════════════
// JSONBIN — ÉCRITURE (XP + done + streak)
// ═══════════════════════════════════════════════════════
async function syncProgress(doneKey){
  if(!JSONBIN_KEY||JSONBIN_KEY==='<TA_CLE_ICI>') return;
  try{
    const r1=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_BIN_ID+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY}});
    if(!r1.ok) throw new Error('GET '+r1.status);
    const data=await r1.json();
    const record=data.record||{};

    let targetKey=Object.keys(record).find(k=>k!=='init'&&record[k]&&(record[k].name||'').toLowerCase()===activeProfile);
    if(!targetKey){ targetKey='p_'+Date.now(); record[targetKey]={name:activeProfile.charAt(0).toUpperCase()+activeProfile.slice(1),avatar:'🥽',xp:0,done:{},streak:myStreak,updatedAt:Date.now()}; }
    if(!record[targetKey].done) record[targetKey].done={};

    record[targetKey].done[doneKey]=true;
    myDone[doneKey]=true;
    myXp=calcXP(myDone);
    record[targetKey].xp=myXp;
    record[targetKey].updatedAt=Date.now();

    const r2=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_BIN_ID,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},body:JSON.stringify(record)});
    if(!r2.ok) throw new Error('PUT '+r2.status);
    loadLeaderboard();
  }catch(e){ statusEl.style.color='#ff6b81'; statusEl.textContent='Sync échoué: '+e.message; }
}

// ═══════════════════════════════════════════════════════
// JSONBIN — CLASSEMENT
// ═══════════════════════════════════════════════════════
async function loadLeaderboard(){
  if(!JSONBIN_KEY||JSONBIN_KEY==='<TA_CLE_ICI>') return;
  try{
    const res=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_BIN_ID+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY}});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const record=(await res.json()).record||{};
    lbRows=Object.entries(record).filter(([k,v])=>k!=='init'&&v&&v.name).map(([,v])=>({name:v.name,xp:calcXP(v.done||{}),isMe:(v.name||'').toLowerCase()===activeProfile}));
    lbRows.sort((a,b)=>b.xp-a.xp);
    drawLeaderboard(lbP.ctx,440,280); lbP.tex.needsUpdate=true;
  }catch(e){ /* silencieux */ }
}
setInterval(loadLeaderboard,20000);

// ═══════════════════════════════════════════════════════
// DESKTOP CONTROLS
// ═══════════════════════════════════════════════════════
let yaw=0,pitch=0,drag=false,lx=0,ly=0;
renderer.domElement.addEventListener('pointerdown',e=>{ if(renderer.xr.isPresenting) return; drag=true; lx=e.clientX; ly=e.clientY; });
window.addEventListener('pointerup',()=>drag=false);
window.addEventListener('pointermove',e=>{ if(!drag||renderer.xr.isPresenting) return; yaw-=(e.clientX-lx)*.004; pitch-=(e.clientY-ly)*.003; pitch=Math.max(-1,Math.min(1,pitch)); lx=e.clientX; ly=e.clientY; camera.rotation.set(pitch,yaw,0,'YXZ'); });

const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
renderer.domElement.addEventListener('click',e=>{
  if(renderer.xr.isPresenting) return;
  mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(btnMeshes.filter(m=>m.visible));
  if(hits.length&&hits[0].object.userData.cb) hits[0].object.userData.cb();
});

// ═══════════════════════════════════════════════════════
// VR CONTROLLERS
// ═══════════════════════════════════════════════════════
const tmpM=new THREE.Matrix4();
[0,1].forEach(i=>{
  const ctrl=renderer.xr.getController(i);
  const ray=new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,0,-1)]),new THREE.LineBasicMaterial({color:0x00f0ff,transparent:true,opacity:.6}));
  ray.scale.z=5; ctrl.add(ray);
  ctrl.addEventListener('selectstart',()=>{
    tmpM.identity().extractRotation(ctrl.matrixWorld);
    raycaster.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tmpM);
    const hits=raycaster.intersectObjects(btnMeshes.filter(m=>m.visible));
    if(hits.length&&hits[0].object.userData.cb) hits[0].object.userData.cb();
  });
  scene.add(ctrl);
});

// ═══════════════════════════════════════════════════════
// VR BUTTON
// ═══════════════════════════════════════════════════════
const vrBtn=document.getElementById('vrBtn');
if(!navigator.xr){ vrBtn.disabled=true; }
else { navigator.xr.isSessionSupported('immersive-vr').then(s=>{ if(!s) vrBtn.disabled=true; }); }
let xrSession=null;
vrBtn.addEventListener('click',async()=>{
  if(xrSession){ xrSession.end(); return; }
  try{
    const s=await navigator.xr.requestSession('immersive-vr',{optionalFeatures:['local-floor','bounded-floor']});
    xrSession=s; renderer.xr.setSession(s);
    vrBtn.textContent='⏹ Quitter VR';
    s.addEventListener('end',()=>{ xrSession=null; vrBtn.textContent='🥽 Entrer en VR'; });
  }catch(e){ statusEl.textContent='Session refusée: '+e.message; }
});

// ═══════════════════════════════════════════════════════
// BOUCLE D'ANIMATION
// ═══════════════════════════════════════════════════════
let t=0;
renderer.setAnimationLoop(()=>{
  t+=.01;
  const pa=pGeo.attributes.position.array;
  for(let i=0;i<80;i++) pa[i*3+1]+=Math.sin(t+i)*.0005;
  pGeo.attributes.position.needsUpdate=true;
  if(xpAnim){ xpAnim.t+=.02; xpFloatM.position.y=.28+xpAnim.t*.14; xpFloatM.material.opacity=Math.max(0,1-xpAnim.t); if(xpAnim.t>1){xpAnim=null;xpFloatM.position.y=.28;} }
  drawProfile(profileP.ctx,440,280); profileP.tex.needsUpdate=true;
  renderer.render(scene,camera);
});

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
if(activeProfile&&groqKey){
  loadPlayerData().then(()=>{ renderZoneSelect(); loadLeaderboard(); });
}
